<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="195"/>
    </clipPath>
  </defs>

  <!-- Background only inside circle -->
  <circle cx="200" cy="200" r="195" fill="#faf9f7"/>

  <!-- Inner double ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#222" stroke-width="1.2"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="#222" stroke-width="0.4"/>

  <!-- Monogram K italic -->
  <text x="200" y="195" font-family="Georgia, serif" font-size="100" font-style="italic" font-weight="300" fill="#1a1a1a" text-anchor="middle">K</text>

  <!-- Divider with dot -->
  <line x1="138" y1="218" x2="196" y2="218" stroke="#333" stroke-width="0.7"/>
  <line x1="204" y1="218" x2="262" y2="218" stroke="#333" stroke-width="0.7"/>
  <circle cx="200" cy="218" r="2.5" fill="#333"/>

  <!-- Brand name -->
  <text x="200" y="244" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="300" fill="#1a1a1a" text-anchor="middle" letter-spacing="5">KLIMATY</text>
  <text x="200" y="262" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="300" fill="#666" text-anchor="middle" letter-spacing="3">NA KWIATY</text>

  <!-- Floral sprig -->
  <line x1="200" y1="278" x2="200" y2="292" stroke="#555" stroke-width="0.7"/>
  <ellipse cx="194" cy="281" rx="5" ry="2.5" fill="none" stroke="#888" stroke-width="0.6" transform="rotate(-30,194,281)"/>
  <ellipse cx="206" cy="281" rx="5" ry="2.5" fill="none" stroke="#888" stroke-width="0.6" transform="rotate(30,206,281)"/>
  <ellipse cx="191" cy="286" rx="5" ry="2.5" fill="none" stroke="#aaa" stroke-width="0.5" transform="rotate(-45,191,286)"/>
  <ellipse cx="209" cy="286" rx="5" ry="2.5" fill="none" stroke="#aaa" stroke-width="0.5" transform="rotate(45,209,286)"/>
  <ellipse cx="200" cy="276" rx="2.5" ry="4" fill="none" stroke="#666" stroke-width="0.6"/>
</svg>